version: '3.8'

# ============================================================================
# Minimal Release Mode
# ----------------------------------------------------------------------------
# This release ships only the coordination layer (Flask `backend` +
# React `frontend` + Postgres). All AMP microservices are kept as
# DIRECTORY PLACEHOLDERS under `services/*/` with an `IMPLEMENTATION.md`
# that documents how to restore each one from the upstream source.
#
# The 9 microservice blocks (generator / mic / macrel / hemolysis /
# cpp / structure / hydramp / diff-amp / amp-pgat-abpp) have been
# commented out below. Re-activate them after you have cloned the
# corresponding upstream implementation into each service directory
# (see QUICKSTART.md → "Minimal Release Mode").
# ============================================================================

