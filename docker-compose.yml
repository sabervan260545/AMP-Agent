  #   networks:
  #     - amp-net
  #   restart: "no"

  # ==========================================================================
  # Postgres (ontology store — always shipped)
  # ==========================================================================
  postgres:
    image: ankane/pgvector:latest
    container_name: amp-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=amp_user
      - POSTGRES_PASSWORD=your_password_here
      - POSTGRES_DB=amp_ontology
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - amp-net

  # ==========================================================================
  # Flask Backend API
  # ----------------------------------------------------------------------------
  # Note (Minimal Release Mode): `depends_on` lists only `postgres`. All
  # prediction / generation microservices are directory placeholders in
  # this release; re-add them here when you re-enable their blocks above.
  # ==========================================================================
  backend:
    image: amp-generator-platform-backend
    container_name: amp-backend
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./agent:/app/agent
      - ./visualization:/app/visualization
      - ./data:/app/data
      - ./knowledge_builder:/data/amp-generator-platform/knowledge_builder
      - /home/ubuntu/.cache/huggingface:/root/.cache/huggingface
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - ONTOLOGY_PG_DSN=postgresql://amp_user:your_password_here@amp-postgres:5432/amp_ontology
    networks:
      - amp-net
    depends_on:
      - postgres
    restart: unless-stopped

  # ==========================================================================
  # React Frontend
  # ==========================================================================
  frontend:
    image: amp-generator-platform-frontend
    container_name: amp-frontend
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - amp-net
    depends_on:
      - backend
    restart: unless-stopped

networks:
  amp-net:
    driver: bridge
