  # ==========================================================================
  # knowledge-builder (knowledge-base PDF/CSV ingest, still shipped as code)
  # ==========================================================================
  knowledge-builder:
    build: ./knowledge_builder
    container_name: amp-knowledge-builder
    volumes:
      - ./knowledge_builder/raw_documents:/app/raw_documents
      - ./knowledge_builder/raw_literature:/app/raw_literature
      - ./knowledge_builder/integrated_knowledge_base:/app/integrated_knowledge_base
      - ./data/models/huggingface:/root/.cache/huggingface
      - ./knowledge_builder:/app
      - /home/ubuntu/.cache/huggingface/hub:/root/.cache/huggingface/hub:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python run_pdf_processing.py
    networks:
      - amp-net

